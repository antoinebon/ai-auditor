# MLflow tracking server + ai-auditor app, wired together.
# Ollama runs on the host; both containers reach it through
# host.docker.internal:host-gateway.

services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: ai-auditor-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlruns.db
        --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-auditor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-auditor
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT: ai-auditor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./out:/app/out
      - ./out-eval:/app/out-eval
    # No default command — invoke with e.g.:
    #   docker compose run --rm ai-auditor analyze /app/data/examples/minimal_policy.pdf --agentic

volumes:
  mlflow_data:
