# MLflow tracking server + Ollama + ai-auditor app, wired together.
# Everything runs in containers — no host Ollama required. Ollama runs
# CPU-only; the first run pulls the model (~4 GB for qwen2.5:7b-instruct)
# into the named volume, subsequent runs reuse it.
#
# To use a host Ollama instead, override OLLAMA_HOST on the ai-auditor
# service (e.g. `OLLAMA_HOST=http://host.docker.internal:11434`) and add
# `extra_hosts: ["host.docker.internal:host-gateway"]`.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-auditor-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  # One-shot sidecar: waits for Ollama to be healthy, pulls the configured
  # model, and exits. ai-auditor depends on this completing successfully,
  # so the app never starts before the model is available.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ai-auditor-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
    entrypoint: /bin/sh
    command: -c 'ollama pull "$$OLLAMA_MODEL"'
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: ai-auditor-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlruns.db
        --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-auditor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-auditor
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      MLFLOW_EXPERIMENT: ai-auditor
    volumes:
      - ./data:/app/data
      - ./out:/app/out
    # No default command — invoke with e.g.:
    #   docker compose run --rm ai-auditor analyze /app/data/examples/minimal_policy.pdf --agentic

volumes:
  mlflow_data:
  ollama_data:
